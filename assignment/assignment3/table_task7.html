<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <h1 align="center">HTML Table Cell Merging</h1>

    <p align="center">
      These tables demonstrate the use of <b>rowspan</b> and <b>colspan</b> attributes in
      HTML. <br> They show how table cells can be merged across rows and columns to
      create complex table layouts.
    </p>
    <hr> <br>
    <h1>Task 7:</h1>

    <table border="1" cellspacing="0">
      <tr>
        <td colspan="2">A</td>
      </tr>
      <tr>
        <td rowspan="2">C</td>
        <td>D</td>
        <td>B</td>
      </tr>
      <tr>
        <td>E</td>
      </tr>
    </table>
    <br />

    <table border="1" cellspacing="0">
      <tr>
        <td rowspan="3">1</td>
        <td>2</td>
        <td>3</td>
      </tr>
      <tr>
        <td colspan="2">5</td>
        <td>4</td>
      </tr>
      <tr>
        <td>6</td>
        <td>7</td>
      </tr>
    </table>

    </h1>
  </body>
</html>
