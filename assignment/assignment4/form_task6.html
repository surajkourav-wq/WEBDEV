<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Task 6:</h1>
    <h1>Registration Form : Dance Club </h1>
    <hr>

    <form>
        <table border="1">
            <tr>
                <th>Name:</th>
                <td colspan="3"><input type="text" size="40"></td>
            </tr>
            <tr>
                <th>IC No:</th>
                <td><input type="text" size="7"></td>
                <td><input type="text" size="5"></td>
                <td><input type="text" size="4"></td>
            </tr>
            <tr>
                <th>Address:</th>
                <td colspan="3"><textarea></textarea></td>
            </tr>
            <tr>
                <th>Gender:</th>
                <td colspan="3"><input type="radio">Male <input type="radio">Female</td>
            </tr>
            <tr>
                <th>Competition:</th>
                <td colspan="3"><select>
                    <option value="State Level">State Level</option>
                    <option value="National Level">National Level</option>
                    <option value="StateInternational Level">StateInternational Level</option>
                </select></td>
            </tr>
            <tr>
                <th>Nationality:</th>
                <td colspan="3"><select>
                    <option value="">-please select</option>
                    <option value="Indian">Indian</option>
                </select></td>
            </tr>
            <tr>
                <th>Password:</th>
                <td><input type="password"></td>
            </tr>
        </table>
        <button type="submit">Register Me</button>
        <button type="reset">cancel</button>
    </form>
</body>
</html>
