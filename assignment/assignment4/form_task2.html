<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
   <h1>Task 2:</h1>
   
   Please enter your personal details: <br> <br>

   <form>
    <label for="Firstname"><b><u>F</u></b>irst name:*</label>
    <input type="text"> <br> <br>
    <label for="Lastname"><b><u>L</u></b>ast name:*</label>
    <input type="text"> <br> <br>
    <label for="StreetAddress">Street <b><u>a</u></b>ddress</label>
    <input type="text" size="40"> <br> <br>
    <label for="town , city"><b><u>T</u></b>own/city:</label>
    <input type="text"> <br> <br>
    <label for="Postcode/zip">Post<b><u>c</u></b>ode/zip:</label>
    <input type="number" size="10"> <br> <br>
    <label for="Telephone">Tele<b><u>p</u></b>hone:</label>
    <input type="number"> <br> <br>
    <label for="Mobile"><b><u>M</u></b>obile:</label>
    <input type="number"> <br> <br>
    <label for="EmailAddress"><b><u>E</u></b>mail address:*</label>
    <input type="email" size="40">
    <p>Fields marked <sup>*</sup> are required</p>
    <button><b><u>S</u></b>ubmit</button>
   </form>
