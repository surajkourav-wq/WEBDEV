<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Task 3:</h1>

    <h1>Registration Form</h1>

    <form>
        <div>
            <label for="Firstname">First Name:</label>
            <input type="text" name="Firstname" id="Firstname" placeholder="Enter First Name">
        </div>
        <div>
            <label for="Lastname">Last Name:</label>
            <input type="text" name="Lastname" id="Lastname" placeholder="Enter Last Name">
        </div>
        <div>
            <label for="Email">Email:</label>
            <input type="email" name="Email" id="Email" placeholder="Enter Email Assress">
        </div>
        <div>
            <label for="Password">Password:</label>
            <input type="password" name="Password" id="Password">
        </div>
        <label for="Gender">Gender:</label> <br>
        Male <input type="radio" name="Gender" id="Gender"> <br>
        Female <input type="radio" name="Gender" id="Gender"> <br>
        Other <input type="radio" name="Gender" id="Gender"> <br>
        <div>
            <label for="Age">Age:</label>
            <input type="number" name="Age" id="Age">
        </div>
        <label for="Preferences">Prefences:</label> <br>
        Acrylic Painting <input type="checkbox" name="Preefences" id="Prefences"> <br>
        Oil Painting <input type="checkbox" name="Prefences" id="Prefences"> <br>
        Water color Painting <input type="checkbox" name="Prefences" id="Prefences"> <br>
        <label for="Select Occupation">Select Occupation</label>
        <select id="Select Occupation">Select Occupation
            <option value="Student">Student</option>
        </select>
        <div>
            <label for="Bio">Bio</label>
            <textarea name="Bio" id="Bio">Share few lines about yourself...</textarea>
        </div>
        <button>RESET</button>
        <button>SELECT</button>
    </form>
</body>
</html>
