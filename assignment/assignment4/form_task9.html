<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Order Form</title>
</head>
<body>
    <h1>Task 9:</h1>

    <fieldset>
        <h1>Pizza Order Form</h1>

        <b>First Name:</b> <input type="text"> <br><br>
        <b>Last Name:</b><input type="text"> <br><br>
        <b>Email Address</b> <input type="text"> <br><br>
        <b>Contact Number:</b> <input type="text"> <br><br>
        <b>Preferred Delivery Date:</b> <input type="date"> <br><br>
        <b>Size:</b> <br> <br>
        <input type="radio"> Small
        <input type="radio"> Medium
        <input type="radio"> Large <br><br>
        <b>Flavor:</b> <br>
        <input type="checkbox"> Hawailan(Php 150.00) <select><option value="1">1</option></select> <br>
        <input type="checkbox"> Pepperoni(Php 140.00) <select><option value="1">1</option></select> <br>
        <input type="checkbox"> Vegetable (Php 130.00) <select><option value="1">1</option></select> <br> <br>
        <b>Credit Card Number:</b> <input type="text"> <br><br>
        <b>PIN:</b> <input type="text"> <br><br>
        <b>Additional Note:</b> <br>
        <textarea></textarea> <br><br>
        <button type="submit">Submit Order</button>
    </fieldset>
</body>
</html>
